services:
    nginx:
        image: nginx:stable-alpine
        container_name: nginx
        ports:
            - 80:80
            - 443:443
        networks:
            - main
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf:ro
            - ./certs:/etc/letsencrypt/live:ro
        depends_on:
            - api
            - admin
            - web

    migrate:
        build:
            context: .
            dockerfile: libs/database/Dockerfile
        container_name: migrate
        networks:
            - main
        volumes:
            - ./envs/.api.env:/opt/app/.env
        depends_on:
            database:
                condition: service_healthy
        restart: 'no'
    api:
        build:
            context: .
            dockerfile: apps/api/Dockerfile
        container_name: api
        restart: always
        environment:
            NODE_ENV: production
        networks:
            - main
        ports:
            - 3000:3000
        volumes:
            - ./envs/.api.env:/opt/app/.env
        depends_on:
            database:
                condition: service_healthy
            redis:
                condition: service_healthy
    admin:
        build:
            context: .
            dockerfile: apps/admin/Dockerfile
        container_name: admin
        restart: always
        networks:
            - main
    web:
        build:
            context: .
            dockerfile: apps/web/Dockerfile
        container_name: web
        restart: always
        networks:
            - main
    database:
        image: postgres:17
        container_name: database
        networks:
            - main
        ports:
            - ${DB_PORT}:5432
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_NAME}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U "${DB_USER}" -d "${DB_NAME}"']
            interval: 5s
            timeout: 5s
            retries: 5
    redis:
        image: redis:8-alpine
        container_name: redis
        networks:
            - main
        ports:
            - 6379:6379
        environment:
            REDISCLI_AUTH: ${REDIS_PASSWORD}
        command: ['redis-server', '--requirepass', '${REDIS_PASSWORD}', '--appendonly', 'yes']
        volumes:
            - redis_data:/data
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 3s
            retries: 3
    queue-redis:
        image: redis:8-alpine
        container_name: queue-redis
        networks:
            - main
        ports:
            - 6380:6379
        environment:
            REDISCLI_AUTH: ${QUEUE_REDIS_PASSWORD}
        command: ['redis-server', '--requirepass', '${QUEUE_REDIS_PASSWORD}', '--appendonly', 'yes']
        volumes:
            - queue-redis_data:/data
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 3s
            retries: 3

volumes:
    postgres_data:
    redis_data:
    queue-redis_data:

networks:
    main:
        driver: bridge
